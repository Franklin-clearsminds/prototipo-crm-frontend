<header class="header-container">
  <!-- Left Side: Toggle Sidebar & Search -->
  <div class="header-left">
    <button class="menu-toggle-btn" (click)="toggleSidebar.emit()" aria-label="Toggle Sidebar">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-menu"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
    </button>

    <form class="search-form" (ngSubmit)="onSearchSubmit()">
      <div class="search-input-wrapper">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" 
               class="form-control search-field" 
               [placeholder]="t('header.search')" 
               [ngModel]="globalSearch()" 
               (ngModelChange)="globalSearch.set($event)" 
               name="search">
      </div>
    </form>
  </div>

  <!-- Right Side: Action CTA, Language, Notifications, Profile -->
  <div class="header-right">
    <!-- Quick Add Lead Button -->
    <button class="btn btn-primary lead-btn" (click)="openLeadModal()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
      <span>{{ t('header.newLead') }}</span>
    </button>

    <!-- Language Toggle Button -->
    <div class="lang-toggle-wrapper">
      <button class="header-action-btn lang-btn" (click)="toggleLang()" [title]="currentLang === 'es' ? 'Switch to English' : 'Cambiar a Español'">
        <span class="lang-text">{{ currentLang === 'es' ? 'ES' : 'EN' }}</span>
      </button>
    </div>

    <!-- Notification Bell -->
    <div class="action-dropdown-wrapper">
      <button class="header-action-btn" (click)="toggleNotif()" aria-label="Notifications">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        <span class="badge-count" *ngIf="unreadNotificationsCount > 0">{{ unreadNotificationsCount }}</span>
      </button>

      <!-- Dropdown Feed -->
      <div class="dropdown-panel notif-panel" *ngIf="showNotifications()">
        <div class="dropdown-header">
          <h3>{{ t('header.notifications') }}</h3>
          <button (click)="markAllRead()">{{ t('header.markRead') }}</button>
        </div>
        <ul class="dropdown-list">
          <li *ngFor="let item of notifications()" [class.unread]="!item.read">
            <div class="notif-marker" *ngIf="!item.read"></div>
            <div class="notif-content">
              <p class="notif-title">{{ item.title }}</p>
              <p class="notif-desc">{{ item.desc }}</p>
              <span class="notif-time">{{ item.time }}</span>
            </div>
          </li>
        </ul>
      </div>
    </div>

    <!-- Divider -->
    <div class="header-divider"></div>

    <!-- User Profile Dropdown -->
    <div class="action-dropdown-wrapper" *ngIf="user">
      <button class="profile-trigger-btn" (click)="toggleProfile()">
        <img class="profile-avatar" [src]="user.avatarUrl" alt="Avatar">
        <div class="profile-meta">
          <span class="profile-name">{{ user.name }}</span>
          <span class="profile-role">{{ user.role === 'admin' ? t('header.admin') : t('header.agent') }}</span>
        </div>
        <svg class="chevron-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </button>

      <div class="dropdown-panel profile-menu-panel" *ngIf="showProfileMenu()">
        <div class="profile-dropdown-userinfo">
          <strong>{{ user.name }}</strong>
          <span>{{ user.email }}</span>
        </div>
        <ul>
          <li>
            <a routerLink="/settings" (click)="showProfileMenu.set(false)">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              {{ t('header.profileSettings') }}
            </a>
          </li>
          <li>
            <button class="profile-logout-btn" (click)="logout()">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              {{ t('menu.logout') }}
            </button>
          </li>
        </ul>
      </div>
    </div>
  </div>
</header>

<!-- QUICK NEW LEAD MODAL -->
<div class="modal-backdrop" *ngIf="showLeadModal()" (click)="closeLeadModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ t('modal.title') }}</h2>
      <button class="modal-close" (click)="closeLeadModal()">&times;</button>
    </div>
    
    <form [formGroup]="leadForm" (ngSubmit)="submitLead()">
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group col">
            <label>{{ t('modal.name') }}</label>
            <input type="text" class="form-control" formControlName="name" placeholder="Ej. Robert Taylor">
            <span class="form-error" *ngIf="leadForm.get('name')?.touched && leadForm.get('name')?.invalid">
              El nombre es requerido
            </span>
          </div>
          <div class="form-group col">
            <label>{{ t('modal.phone') }}</label>
            <input type="text" class="form-control" formControlName="phone" placeholder="Ej. +1 (512) 555-0199">
            <span class="form-error" *ngIf="leadForm.get('phone')?.touched && leadForm.get('phone')?.invalid">
              Formato de teléfono inválido
            </span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group col">
            <label>{{ t('modal.state') }}</label>
            <select class="form-control" formControlName="state">
              <option value="">Seleccione estado</option>
              <option *ngFor="let st of states" [value]="st">{{ st }}</option>
            </select>
            <span class="form-error" *ngIf="leadForm.get('state')?.touched && leadForm.get('state')?.invalid">
              El estado es requerido
            </span>
          </div>
          <div class="form-group col">
            <label>{{ t('modal.age') }}</label>
            <input type="number" class="form-control" formControlName="age">
            <span class="form-error" *ngIf="leadForm.get('age')?.touched && leadForm.get('age')?.invalid">
              Debe estar entre 18 y 100 años
            </span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group col">
            <label>{{ t('modal.interest') }}</label>
            <input type="text" class="form-control" formControlName="interest" placeholder="Ej. Term Life ($500k)">
          </div>
          <div class="form-group col">
            <label>{{ t('modal.health') }}</label>
            <input type="text" class="form-control" formControlName="healthCondition" placeholder="Ej. Excelente, Diabético controlado">
          </div>
        </div>

        <div class="form-group">
          <label>{{ t('modal.campaign') }}</label>
          <select class="form-control" formControlName="campaignId">
            <option *ngFor="let camp of campaigns()" [value]="camp.id">{{ camp.name }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>{{ t('modal.notes') }}</label>
          <textarea class="form-control" formControlName="notes" rows="2" placeholder="Escriba comentarios adicionales..."></textarea>
        </div>
      </div>
      
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="closeLeadModal()">{{ t('modal.cancel') }}</button>
        <button type="submit" class="btn btn-primary" [disabled]="leadForm.invalid">{{ t('modal.save') }}</button>
      </div>
    </form>
  </div>
</div>
