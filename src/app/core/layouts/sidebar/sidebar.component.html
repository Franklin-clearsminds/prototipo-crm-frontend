<!-- Mobile Toggle Button -->
<button class="mobile-toggle" (click)="toggleMobile()" aria-label="Toggle menu">
  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
</button>

<!-- Mobile Overlay -->
<div class="sidebar-overlay" *ngIf="isMobileOpen()" (click)="toggleMobile()"></div>

<!-- Main Sidebar Container -->
<aside class="sidebar-container" [class.collapsed]="isCollapsed()" [class.mobile-open]="isMobileOpen()">
  <!-- Sidebar Header -->
  <div class="sidebar-header">
    <div class="logo-wrapper">
      <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <div class="logo-text-group" *ngIf="!isCollapsed()">
        <span class="logo-title">InsureFlow</span>
        <span class="logo-subtitle">Life Ops Pro</span>
      </div>
    </div>
  </div>

  <!-- Navigation Menu Items -->
  <nav class="sidebar-nav">
    <ul>
      <ng-container *ngFor="let item of menuItems">
        <li *ngIf="hasAccess(item)">
          <a [routerLink]="item.route" 
             routerLinkActive="active" 
             [title]="isCollapsed() ? t(item.translationKey) : ''"
             (click)="isMobileOpen.set(false)">
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" [ngSwitch]="item.icon">
              <ng-container *ngSwitchCase="'dashboard'">
                <rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/>
              </ng-container>
              <ng-container *ngSwitchCase="'leads'">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </ng-container>
              <ng-container *ngSwitchCase="'agents'">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </ng-container>
              <ng-container *ngSwitchCase="'pipeline'">
                <path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/>
              </ng-container>
              <ng-container *ngSwitchCase="'calls'">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
              </ng-container>
              <ng-container *ngSwitchCase="'sms'">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </ng-container>
              <ng-container *ngSwitchCase="'phoneLines'">
                <rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/>
              </ng-container>
              <ng-container *ngSwitchCase="'campaigns'">
                <path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
              </ng-container>
              <ng-container *ngSwitchCase="'reports'">
                <path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M12 17v-4"/><path d="M6 17v-2"/>
              </ng-container>
              <ng-container *ngSwitchCase="'settings'">
                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>
              </ng-container>
            </svg>
            <span class="nav-label" *ngIf="!isCollapsed()">{{ t(item.translationKey) }}</span>
          </a>
        </li>
      </ng-container>
    </ul>
  </nav>

  <!-- Sidebar Footer -->
  <div class="sidebar-footer">
    <button class="logout-btn" (click)="logout()" [title]="isCollapsed() ? t('menu.logout') : ''">
      <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span class="nav-label" *ngIf="!isCollapsed()">{{ t('menu.logout') }}</span>
    </button>
  </div>
</aside>
