<div class="login-wrapper">
  <!-- Decorative Background blobs -->
  <div class="background-decor blob-1"></div>
  <div class="background-decor blob-2"></div>

  <div class="login-card card">
    <div class="login-header">
      <!-- Shield logo -->
      <svg class="logo-shield" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <h2>InsureFlow</h2>
      <p class="subtitle">Bienvenido nuevamente</p>
    </div>

    <!-- Error Alert Banner -->
    <div class="alert-banner error" *ngIf="errorMessage()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>{{ errorMessage() }}</span>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()">
      <!-- Email Field -->
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <div class="input-icon-wrapper">
          <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" 
                 id="email" 
                 class="form-control" 
                 formControlName="email" 
                 placeholder="ejemplo@insureflow.com"
                 [attr.disabled]="isLoading() ? true : null">
        </div>
        <span class="form-error" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
          Ingrese un correo electrónico válido
        </span>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-icon-wrapper">
          <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input [type]="showPassword() ? 'text' : 'password'" 
                 id="password" 
                 class="form-control password-field" 
                 formControlName="password" 
                 placeholder="••••••••"
                 [attr.disabled]="isLoading() ? true : null">
          <button type="button" 
                  class="eye-btn" 
                  (click)="togglePassword()" 
                  [attr.disabled]="isLoading() ? true : null"
                  aria-label="Toggle Password Visibility">
            <!-- Eye or Eye-off SVG -->
            <svg *ngIf="!showPassword()" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg *ngIf="showPassword()" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <span class="form-error" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          La contraseña es requerida
        </span>
      </div>

      <!-- Remember Me & Forgot Password -->
      <div class="options-row">
        <label class="remember-checkbox">
          <input type="checkbox" formControlName="rememberMe">
          <span>Recordarme</span>
        </label>
        <a class="forgot-link" href="javascript:void(0)">¿Olvidaste tu contraseña?</a>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn btn-primary login-submit-btn" [disabled]="loginForm.invalid || isLoading()">
        <span class="spinner" *ngIf="isLoading()"></span>
        <span *ngIf="!isLoading()">Iniciar sesión &rarr;</span>
      </button>
    </form>

    <!-- Quick Access seeds -->
    <div class="quick-access-section">
      <div class="divider-text">o ingresar rápido como</div>
      <div class="quick-btn-grid">
        <button type="button" class="btn btn-secondary" (click)="quickLogin('admin')">
          Administrador
        </button>
        <button type="button" class="btn btn-secondary" (click)="quickLogin('agent')">
          Agente de Ventas
        </button>
      </div>
    </div>
  </div>

  <footer class="login-footer">
    <div class="footer-links">
      <span>● Sistemas operativos</span>
      <span>● Centro de ayuda</span>
    </div>
  </footer>
</div>
